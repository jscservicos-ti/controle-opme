{% extends 'estoque/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 6rem;"></i>
        <h2 class="mt-4 fw-bold text-dark">Acesso Restrito</h2>
        <p class="text-muted fs-5 mt-3">{{ msg }}</p>
        <p class="small text-secondary mb-5">Por favor, entre em contato com o administrador do sistema ou o setor de T.I. para realizar a liberação do seu perfil em uma de nossas unidades.</p>
        
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-dark btn-lg fw-bold px-5 shadow"><i class="bi bi-box-arrow-left"></i> Desconectar</button>
        </form>
    </div>
</div>
{% endblock %}
