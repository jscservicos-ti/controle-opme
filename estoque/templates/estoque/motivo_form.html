{% extends 'estoque/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Cadastrar Motivo de Baixa</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">Descrição do Motivo</label>
                        {{ form.nome }}
                        <div class="text-danger small">{{ form.nome.errors }}</div>
                    </div>

                    <div class="form-check form-switch mb-4">
                        {{ form.ativo }}
                        <label class="form-check-label text-muted">Motivo Ativo para uso</label>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{% url 'motivo_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success">Salvar Motivo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
