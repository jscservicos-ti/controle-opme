{% extends 'estoque/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-primary">
            <div class="card-header bg-dark text-white fw-bold">Cadastrar Fornecedor</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Nome da Empresa</label>
                        {{ form.nome }}
                        <div class="text-danger small">{{ form.nome.errors }}</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label">CNPJ</label>
                            {{ form.cnpj }}
                            <div class="text-danger small">{{ form.cnpj.errors }}</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            {{ form.telefone }}
                            <div class="text-danger small">{{ form.telefone.errors }}</div>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4">
                        {{ form.ativo }}
                        <label class="form-check-label text-muted">Cadastro Ativo</label>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{% url 'fornecedor_list' %}" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold">Salvar Fornecedor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cnpjInput = document.querySelector('input[name="cnpj"]');
        
        if (cnpjInput) {
            cnpjInput.addEventListener('input', function(e) {
                // Remove tudo que não é dígito
                let value = e.target.value.replace(/\D/g, '');
                
                // Limita a 14 dígitos máximos
                if (value.length > 14) value = value.slice(0, 14);
                
                // Aplica a máscara do CNPJ: 00.000.000/0000-00
                value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                value = value.replace(/(\d{4})(\d)/, '$1-$2');
                
                e.target.value = value;
            });
        }
    });
</script>
{% endblock %}
